name: Feature Request / 功能请求
description: Suggest a new feature or enhancement / 建议新功能或改进
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see.
        感谢您提出功能建议！请描述您希望看到的功能。

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement / 问题描述
      description: What problem does this feature solve? / 这个功能解决什么问题？
      placeholder: I'm always frustrated when... / 我总是感到困扰当...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution / 建议方案
      description: Describe the solution you'd like. / 描述您期望的解决方案。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered / 替代方案
      description: Any alternative solutions or features you've considered. / 您考虑过的其他替代方案。

  - type: textarea
    id: additional
    attributes:
      label: Additional Context / 补充信息
      description: Any other context or screenshots about the feature request. / 关于功能请求的其他信息或截图。
