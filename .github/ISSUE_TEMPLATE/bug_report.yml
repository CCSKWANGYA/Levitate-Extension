name: Bug Report / Bug 报告
description: Report a bug to help us improve the extension / 报告 Bug 帮助我们改进扩展
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below.
        感谢您花时间报告 Bug！请填写以下信息以帮助我们诊断和修复问题。

  - type: input
    id: version
    attributes:
      label: Extension Version / 扩展版本
      description: What version of Levitate-Extension are you using? / 您使用的 Levitate-Extension 版本是多少？
      placeholder: e.g., 1.0.0
    validations:
      required: true

  - type: input
    id: vscode-version
    attributes:
      label: VS Code Version / VS Code 版本
      description: What version of VS Code are you using? / 您使用的 VS Code 版本是多少？
      placeholder: e.g., 1.118.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System / 操作系统
      description: What OS are you using? / 您使用的操作系统是什么？
      placeholder: e.g., Windows 11, macOS 15.0, Ubuntu 24.04
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description / Bug 描述
      description: A clear description of what the bug is. / 清晰描述这个 Bug 是什么。
      placeholder: Describe the bug... / 描述 Bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / 复现步骤
      description: Steps to reproduce the behavior. / 复现该行为的步骤。
      placeholder: |
        1. Open a .lvt file / 打开一个 .lvt 文件
        2. Type '...' / 输入 '...'
        3. See error / 看到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 预期行为
      description: What you expected to happen. / 您预期会发生什么。
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / 实际行为
      description: What actually happened. / 实际发生了什么。
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / 截图
      description: If applicable, add screenshots to help explain the problem. / 如适用，添加截图帮助说明问题。

  - type: textarea
    id: additional
    attributes:
      label: Additional Context / 补充信息
      description: Any other context about the problem (e.g., error logs, related files). / 关于该问题的其他信息（如错误日志、相关文件）。
